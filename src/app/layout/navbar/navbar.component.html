<!-- Navbar Component -->
<nav class="bg-white shadow-md" aria-label="Main navigation">
  <!-- Top Banner -->
  <div class="bg-red-500 flex items-center justify-center h-10 text-center">
    <p class="text-white text-sm md:text-base font-medium">
      لا تفوت الفرصة, الكثير من العروض و الأسعار المميزة. تسوق الآن!
    </p>
  </div>

  <div class="container mx-auto flex items-center justify-between py-4 px-4 md:px-6">
    <div class="container mx-auto flex items-center  py-4 px-4 md:px-6">
    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0" aria-label="Home">
      <img 
        [src]="mainLogo" 
        alt="Skinior Logo" 
        class="h-auto w-auto max-h-14 max-w-xs object-contain" 
        width="140" 
        height="56" 
      />
    </a>

    <!-- Search Bar -->
    <div class="relative ml-4 w-1/3">
      <input
        [(ngModel)]="searchTerm"
        (keyup)="filterProducts()"
        (keydown.enter)="navigateToSearchResults()"
        type="text"
        placeholder="ابحث عن منتج..."
        class="w-full py-1.5 px-3 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
      />
      <!-- Filtered Product List -->
      <ul 
        *ngIf="filteredProducts.length > 0" 
        class="absolute z-10 mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg">
        <li 
          *ngFor="let product of filteredProducts" 
          (click)="goToProductPage(product.handle)"
          class="px-4 py-2 hover:bg-gray-100 cursor-pointer">
          {{ product.name }}
        </li>
      </ul>
    </div>
    </div>

    <!-- Icons -->
    <div class="flex items-center space-x-4 md:space-x-6">
      <!-- Cart Icon -->
      <div class="relative">
        <a routerLink="/cart" aria-label="Cart" class="relative text-gray-800 hover:text-blue-600">
          <i class="bx bx-cart bx-sm"></i>
          <span *ngIf="totalQuantity() > 0"
            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full text-xs w-5 h-5 flex items-center justify-center">
            {{ totalQuantity() }}
          </span>
        </a>
      </div>

      <!-- Mobile Menu Icon -->
      <button 
        class="md:hidden text-gray-800 hover:text-blue-600" 
        (click)="toggleMenu()" 
        aria-label="Toggle Menu" 
        [attr.aria-expanded]="isMenuOpen">
        <i class="bx bx-menu bx-sm"></i>
      </button>
    </div>
  </div>

  <!-- Desktop Navigation Links -->
  <div class="bg-red-500 hidden md:flex items-center justify-center h-10">
    <ul class="flex space-x-6">
      <li *ngFor="let link of navigationLinks">
        <a 
          class="text-white hover:text-gray-300 font-medium transition duration-200 ease-in-out"
          [attr.lang]="link.lang" 
          [routerLink]="link.routerLink" 
          routerLinkActive="active" 
          [routerLinkActiveOptions]="{ exact: link.id === 0 }">
          {{ link.name }}
        </a>
      </li>
    </ul>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div [ngClass]="{ hidden: !isMenuOpen }" class="md:hidden bg-white shadow-lg">
    <ul class="flex flex-col text-center divide-y divide-gray-200">
      <li *ngFor="let link of navigationLinks">
        <a 
          class="text-gray-800 hover:text-blue-600 py-3 font-medium transition duration-200 ease-in-out"
          [attr.lang]="link.lang" 
          [routerLink]="link.routerLink" 
          routerLinkActive="active" 
          [routerLinkActiveOptions]="{ exact: link.id === 0 }">
          {{ link.name }}
        </a>
      </li>
    </ul>
  </div>
</nav>
