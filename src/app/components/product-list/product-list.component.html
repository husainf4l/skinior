<h1 class="text-2xl font-bold text-center mb-6">Products</h1>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let product of products"
        class="bg-white rounded-lg shadow hover:shadow-lg transition-shadow duration-300 p-6 text-center">
        <!-- Add routerLink here -->
        <a [routerLink]="['/shop/product', product.id]">
            <img [src]="product.images[0]?.url" alt="{{ product.name }}"
                class="w-full h-48 object-cover rounded-lg mb-4" />
            <h2 class="text-xl font-semibold text-gray-800">{{ product.name }}</h2>
            <p class="text-lg font-medium text-indigo-600">{{ product.price | currency:'USD' }}</p>
        </a>
    </div>
</div>
