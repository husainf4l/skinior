<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mt-10">
    <div *ngFor="let product of products" dir="ltr">
        <div
            class="bg-white shadow-lg rounded-lg overflow-hidden transition-transform transform hover:scale-105 duration-300">

            <!-- Product Image -->
            <a [routerLink]="['/shop/product', product.id]" class="block">
                <img [src]="product.images[0].url" [alt]="product.name" class="w-full h-64 object-cover"
                    loading="lazy" />
            </a>

            <!-- Product Details -->
            <div class="p-4">
                <!-- Brand Name -->
                <span class="text-gray-500 uppercase text-sm">{{ product.brand }}</span>

                <!-- Product Name -->
                <h3 class="mt-1 text-lg font-semibold text-gray-800 truncate">{{ product.name }}</h3>

                <!-- Price and Add to Cart -->
                <div class="flex items-center justify-between mt-2">
                    <!-- Price -->
                    <p class="text-indigo-600 font-bold text-lg">{{ product.price }} JOD</p>

                    <!-- Add to Cart Button -->
                    <button
                        class="flex items-center justify-center bg-blue-500 text-white p-2 rounded-full hover:bg-blue-600 transition-colors duration-200"
                        (click)="addToCart(product)" [attr.aria-label]="'Add ' + product.name + ' to Cart'">
                        <i class="bx bx-cart"></i>
                    </button>
                </div>

                <!-- Optional: Badges (e.g., New, Sale) -->
                <!-- Uncomment and customize as needed -->
                <!-- 
          <div class="mt-2">
            <span class="inline-block bg-green-200 text-green-800 text-xs px-2 py-1 rounded-full">New</span>
            <span class="inline-block bg-red-200 text-red-800 text-xs px-2 py-1 rounded-full">Sale</span>
          </div>
          -->
            </div>
        </div>
    </div>
</div>
