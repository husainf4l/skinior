<div class="container mx-auto px-4 md:px-6 lg:px-10 my-12 relative">
    <h6 class=" font-extrabold text-right mb-12 tracking-wide text-gray-800">
        {{ title }}
    </h6>

    <div class="overflow-x-auto scroll-smooth">
        <div class="flex gap-8 px-4">
            <div *ngFor="let product of products" class="bg-white rounded-3xl shadow-lg min-w-60 max-w-60 md:min-w-[300px] md:max-w-[300px]
                    hover:shadow-2xl transition-transform transform hover:scale-105 duration-500 
                    snap-center overflow-hidden flex-shrink-0 mb-5">

                <div class="w-60 h-60 md:w-72 md:h-72 bg-gray-100 flex items-center justify-center overflow-hidden">
                    <img [src]="product.image" alt="{{ product.name }}" class="max-w-full max-h-full object-contain">
                </div>
                <div class="p-4 space-y-2" dir="ltr">
                    <!-- Product Name -->
                    <p class="text-center text-sm font-medium text-gray-800 truncate">
                        {{ product.name }}
                    </p>

                    <!-- Prices Section -->
                    <div class="flex justify-center items-baseline gap-2">
                        <!-- Original Price (strikethrough if there's a discount) -->
                        <p class="text-gray-400 text-xs line-through"
                            *ngIf="product.discountedPrice && product.price > product.discountedPrice">
                            {{ product.price | currency: 'JOD' }}
                        </p>

                        <!-- Discounted Price -->
                        <p class="text-red-600 font-semibold text-sm">
                            {{ product.discountedPrice || product.price | currency: 'JOD' }}
                        </p>
                    </div>

                    <!-- View Product Button -->
                    <a [routerLink]="['/shop/product', product.id]" class="block bg-teal-700 hover:bg-teal-900 text-white text-center py-2 
                        rounded-full transition duration-300 text-sm">
                        تفاصيل المنتج
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
