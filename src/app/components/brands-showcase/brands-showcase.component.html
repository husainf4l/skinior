

  <div class="container mx-auto px-4 md:px-6 lg:px-10 my-12">
    <h2 class="text-xl sm:text-2xl md:text-3xl font-extrabold text-right mb-8 tracking-wide text-gray-800">
      تسوق حسب العلامات التجارية
    </h2>
  
    <!-- Scrollable Section -->
    <div class="overflow-x-auto scroll-smooth scrollbar-hide">
      <div class="flex gap-12 px-2 items-center">
  
        <!-- Brand Logo -->
        <div 
          *ngFor="let brand of brands" 
          (click)="navigateToBrand(brand.route)"
          class="cursor-pointer transition-transform hover:scale-110 duration-300 
                 w-32 h-32 flex-shrink-0">
  
          <img [src]="brand.logo" alt="Brand Logo" class="object-contain w-full h-full">
        </div>
        <!-- End of Brand Logo -->
  
      </div>
    </div>
  </div>
