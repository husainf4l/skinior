<!-- src/app/components/featured-products/featured-products.component.html -->

<div class="container mx-auto px-4 md:px-6 lg:px-10 my-12">
    <h2 class="text-2xl md:text-3xl font-bold text-center mb-8">Featured Products</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        <div *ngFor="let product of featuredProducts" class="bg-white shadow-md rounded-lg overflow-hidden">
            <img [src]="product.images[0].url" alt="{{ product.name }}" class="w-full h-60 object-cover">
            <div class="p-4">
                <h3 class="text-lg font-bold">{{ product.name }}</h3>
                <p class="text-gray-600">{{ product.price | currency }}</p>
                <a [routerLink]="['/shop/product', product.id]"
                    class="block mt-4 bg-blue-600 hover:bg-blue-700 text-white text-center py-2 rounded transition duration-300">View
                    Product</a>
            </div>
        </div>
    </div>
</div>
