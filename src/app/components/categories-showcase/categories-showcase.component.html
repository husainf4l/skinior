<div class="container mx-auto px-4 md:px-6 lg:px-10 my-12 relative">
<h2 class="text-xl sm:text-2xl md:text-3xl font-extrabold text-right mb-12 tracking-wide text-gray-800">
      الفئات المميزة
    </h2>
  
    <!-- Scrollable Section -->
    <div class="overflow-x-auto scroll-smooth scrollbar-hide">
      <div class="flex gap-8 px-4">
  
        <!-- Category Card -->
        <div *ngFor="let category of categories" class="bg-white rounded-3xl shadow-lg 
                    hover:shadow-2xl transition-transform transform 
                    hover:scale-105 duration-500 snap-center overflow-hidden flex-shrink-0 mb-5">
  
          <!-- Image Wrapper -->
          <div class="w-60 h-60 bg-gray-100 flex items-center justify-center overflow-hidden">
            <img [src]="category.image" alt="{{ category.name }}" 
            class="w-full h-full object-cover">
        </div>
  
          <!-- Text and Button Section -->
          <div class="p-4 space-y-2">
            <p class="text-center text-lg font-bold text-gray-800">{{ category.name }}</p>
            <a [routerLink]="['/shop/category', category.id]" 
               class="block bg-teal-700 hover:bg-teal-900 text-white text-center py-2 
                      rounded-full transition duration-300 text-sm">
              استكشاف
            </a>
          </div>
  
        </div>
        <!-- End of Category Card -->
  
      </div>
    </div>
  </div>
