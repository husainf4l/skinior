<!-- src/app/components/categories-showcase/categories-showcase.component.html -->

<div class="container mx-auto px-4 md:px-6 lg:px-10 my-12">
    <h2 class="text-2xl md:text-3xl font-bold text-center mb-8">Top Categories</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        <div *ngFor="let category of categories" class="bg-white shadow-md rounded-lg overflow-hidden">
            <img [src]="category.images[0]" alt="{{ category.name }}" class="w-full h-48 object-cover">
            <div class="p-4 text-center">
                <h3 class="text-lg font-bold">{{ category.name }}</h3>
                <a [routerLink]="['/shop/category', category.id]"
                    class="block mt-4 bg-blue-600 hover:bg-blue-700 text-white text-center py-2 rounded transition duration-300">Explore</a>
            </div>
        </div>
    </div>
</div>
