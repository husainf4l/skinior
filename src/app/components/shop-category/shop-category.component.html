<div class="container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">Categories</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div *ngFor="let category of categories" class="bg-white shadow-lg rounded-lg overflow-hidden">
            <div class="p-4">
                <h3 class="font-bold text-lg">{{ category.name }}</h3>
                <a [routerLink]="['/shop/category', category.id]"
                    class="block bg-blue-500 text-white text-center mt-2 py-2 rounded-lg">View Products</a>
            </div>
        </div>
    </div>
</div>
