<div class="flex flex-wrap gap-8 justify-center" dir="ltr">
  <!-- Product Card -->
  <div class="relative w-[350px] h-[440px] bg-white shadow-md rounded-md overflow-hidden group hover:shadow-xl transition-all transform duration-300">
    
    <!-- Image Section -->
    <a [routerLink]="['/shop/product', product.handle]" class="block">
      <div class="w-full h-[350px] overflow-hidden relative">
        <img [src]="product.image" [alt]="product.name"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-300 group-hover:scale-95" loading="lazy" />
      </div>
    </a>

    <!-- Content Section (Expands Over Image on Hover) -->
    <div class="absolute bottom-0 w-full bg-white transition-all duration-300 group-hover:h-[140px] h-[90px] p-4 flex flex-col justify-between">
<div class="flex flex-row justify-between items-center">
  <div class="w-[250px]">
    <span class="text-sm text-gray-500 uppercase block tracking-wide">
      {{ product.brand }}
    </span>

    <p class="text-lg font-medium text-gray-900 mt-1 line-clamp-1">
      {{ product.shortName || product.name }}
    </p>


  </div>
  <div >
  <p class=" text-lg font-medium text-gray-700 line-clamp-1">
    {{product.price}} JOD
  </p>
</div>
</div>

      <!-- Add to Cart Button -->
      <button
        class="w-full bg-gray-700 hover:bg-gray-900 text-white py-2 rounded mt-2 transition-opacity duration-300 opacity-0 group-hover:opacity-100">
        اضف الى السلة
      </button>
    </div>
  </div>
</div>
