<!-- src/app/pages/shop-all.component.html -->

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8" dir="rtl">
    <h1 class="text-3xl font-bold mb-6 text-center">منتجاتنا</h1>

    <!-- Search Bar -->
    <div class="mb-6">
        <div class="relative">
            <input type="text"
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="ابحث عن المنتجات..." [(ngModel)]="search" (ngModelChange)="loadProducts()" />
            <svg class="w-5 h-5 absolute top-2 left-3 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11a4 4 0 10-4 4h8" />
            </svg>
        </div>
    </div>

    <!-- Product Grid -->
    <div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-lg shadow hover:shadow-lg transition-shadow duration-300"
                *ngFor="let product of products | paginate: { itemsPerPage: 9, currentPage: page }">
                <div class="relative">
                    <img *ngIf="product.images && product.images.length > 0" [src]="product.images[0].url"
                        class="w-full h-56 object-cover rounded-t-lg"
                        [alt]="product.images[0].altText || product.name" />
                    <!-- Badge -->
                    <div *ngIf="product.isFeatured"
                        class="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded">
                        مميز
                    </div>
                </div>
                <div class="p-4">
                    <h5 class="text-lg font-semibold mb-2 text-right">{{ product.name }}</h5>
                    <p class="text-gray-600 mb-4 text-right">
                        {{ product.description | slice: 0:80 }}...
                    </p>
                    <div class="flex items-center justify-between">
                        <a [routerLink]="['/product', product.id]"
                            class="inline-block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition-colors duration-300">
                            التفاصيل
                        </a>
                        <p class="text-indigo-600 font-bold text-xl">
                            {{ product.price | currency:'JOD':'symbol':'1.2-2' }}
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div class="mt-8">
            <pagination-controls (pageChange)="page = $event; loadProducts()" class="flex justify-center" [maxSize]="7"
                [directionLinks]="true" [autoHide]="true"></pagination-controls>
        </div>
    </div>
</div>
