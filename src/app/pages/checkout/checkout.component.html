<div class="container mx-auto p-8">
    <h1 class="text-3xl font-bold mb-6">Checkout</h1>
    <form (submit)="placeOrder()" class="space-y-6">

        <!-- Shipping Address Section -->
        <div class="space-y-4">
            <h2 class="text-xl font-semibold">Shipping Address</h2>

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="name" [(ngModel)]="shippingAddress.name" name="name" required
                    class="block w-full p-2 border border-gray-300 rounded-md" />
            </div>

            <div>
                <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                <input type="text" id="address" [(ngModel)]="shippingAddress.address" name="address" required
                    class="block w-full p-2 border border-gray-300 rounded-md" />
            </div>

            <div>
                <label for="city" class="block text-sm font-medium text-gray-700">City</label>
                <input type="text" id="city" [(ngModel)]="shippingAddress.city" name="city" required
                    class="block w-full p-2 border border-gray-300 rounded-md" />
            </div>

            <div>
                <label for="postalCode" class="block text-sm font-medium text-gray-700">Postal Code</label>
                <input type="text" id="postalCode" [(ngModel)]="shippingAddress.postalCode" name="postalCode" required
                    class="block w-full p-2 border border-gray-300 rounded-md" />
            </div>
        </div>

        <!-- Payment Method Section -->
        <div>
            <h2 class="text-xl font-semibold">Payment Method</h2>
            <div class="flex items-center">
                <input type="radio" id="cod" name="paymentMethod" value="CashOnDelivery" [(ngModel)]="paymentMethod"
                    checked>
                <label for="cod" class="ml-2">Cash on Delivery</label>
            </div>
        </div>

        <!-- Place Order Button -->
        <div>
            <button type="submit" class="bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700">
                Place Order
            </button>
        </div>
    </form>
</div>
