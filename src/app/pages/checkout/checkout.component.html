<div>
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6">Checkout</h1>
        <form (submit)="placeOrder()" class="space-y-6">

            <div class="space-y-4">
                <h2 class="text-xl font-semibold">لاكمال الطلب</h2>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
                    <input type="text" id="phoneNumber" [(ngModel)]="phoneNumber" name="phoneNumber" required
                        class="block w-full p-2 border border-gray-300 rounded-md" />
                </div>
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">العنوان</label>
                    <input type="text" id="shippingAddress" [(ngModel)]="shippingAddress" name="shippingAddress"
                        required class="block w-full p-2 border border-gray-300 rounded-md" />
                </div>

                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700">المدينة</label>
                    <input type="text" id="shippingCity" [(ngModel)]="shippingCity" name="shippingCity" required
                        class="block w-full p-2 border border-gray-300 rounded-md" />
                </div>

                <div>
                    <label for="city" class="block text-sm font-medium text-gray-700">البلد</label>
                    <input type="text" id="shippingCountry" [(ngModel)]="shippingCountry" name="shippingCountry"
                        required class="block w-full p-2 border border-gray-300 rounded-md" />
                </div>


            </div>

            <div>
                <h2 class="text-xl font-semibold">Payment Method</h2>
                <div class="flex items-center">
                    <input type="radio" id="cod" name="paymentMethod" value="CashOnDelivery" checked>
                    <label for="cod" class="ml-2">Cash on Delivery</label>
                </div>
            </div>

            <div>
                <button type="submit" class="bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700">
                    Place Order
                </button>
            </div>
        </form>
    </div>

</div>
