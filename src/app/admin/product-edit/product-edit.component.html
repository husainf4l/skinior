<div class="product-edit">
    <h2>Edit Product</h2>
    <form (submit)="saveProduct()">
        <div class="form-group">
            <label for="name">Name:</label>
            <input [(ngModel)]="product.name" type="text" class="form-control" id="name" />
        </div>

        <div class="form-group">
            <label for="price">Price:</label>
            <input [(ngModel)]="product.price" type="number" class="form-control" id="price" />
        </div>

        <div class="form-group">
            <label for="stock">Stock:</label>
            <input [(ngModel)]="product.stock" type="number" class="form-control" id="stock" />
        </div>

        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>
