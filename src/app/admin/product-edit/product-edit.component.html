<div *ngIf="product" class="max-w-2xl mx-auto p-4">
    <h2 class="text-2xl font-semibold mb-6">Edit Product: {{ product.name }}</h2>

    <div class="mb-4">
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" [(ngModel)]="product.name"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
    </div>

    <div class="mb-4">
        <label for="brand" class="block text-sm font-medium text-gray-700">Brand</label>
        <input type="text" id="brand" [(ngModel)]="product.brand"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
    </div>

    <div class="mb-4">
        <label for="price" class="block text-sm font-medium text-gray-700">Price</label>
        <input type="number" id="price" [(ngModel)]="product.price"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
    </div>

    <div class="mb-4">
        <label for="barcode" class="block text-sm font-medium text-gray-700">Barcode</label>
        <input type="text" id="barcode" [(ngModel)]="product.barcode"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
    </div>

    <div class="mb-4">
        <label for="isFeatured" class="block text-sm font-medium text-gray-700">Is Featured?</label>
        <select id="isFeatured" [(ngModel)]="product.isFeatured"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            <option [ngValue]="true">Yes</option>
            <option [ngValue]="false">No</option>
        </select>
    </div>

    <div class="mb-4">
        <label for="category" class="block text-sm font-medium text-gray-700">Category</label>
        <input type="text" id="category" [(ngModel)]="product.categoryId"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
    </div>




    <!-- <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Images</label>
        <div *ngFor="let image of product.image; let i = index" class="flex items-center space-x-4 mt-2">
            <input type="text" [(ngModel)]="product.images[i].url"
                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                placeholder="Image URL" />
            <input type="text" [(ngModel)]="product.images[i].altText"
                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                placeholder="Alt Text" />
        </div>
    </div> -->

    <div class="mb-4">
        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <quill-editor [(ngModel)]="product.descriptionAr" [styles]="{ height: '200px' }" [modules]="quillModules">
        </quill-editor>
    </div>

    <div class="flex justify-end">
        <button (click)="saveProduct()"
            class="px-6 py-2 bg-blue-500 text-white font-medium rounded-lg shadow hover:bg-blue-600 transition">
            Save
        </button>
    </div>
</div>
