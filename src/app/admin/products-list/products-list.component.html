<div class="products-list">
    <h1>Product List</h1>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td>
                    <button (click)="editProduct(product.id)" class="btn btn-sm btn-primary">Edit</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button (click)="bulkEdit()" class="btn btn-secondary">Bulk Edit</button>
</div>
